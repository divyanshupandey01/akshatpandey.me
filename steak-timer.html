<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steak Timer — Perfect Cook. Every Time.</title>
  <meta name="description" content="The most beautifully designed steak timer app. Smart presets, flip alerts, rest phase, and premium animations. Coming soon to Android."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0A0402;--surface:#130806;--card:#1C0D09;--border:#2E1410;
      --red:#C0392B;--red-dim:#7A2318;--red-glow:rgba(192,57,43,0.13);
      --text:#EDE0DC;--muted:#8A6E6A;--caption:#5A3E3A;
    }
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;line-height:1.75;overflow-x:hidden;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,4,2,0.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .nav-logo-icon{width:32px;height:32px;border-radius:9px;overflow:hidden;flex-shrink:0;}
    .nav-logo-icon img{width:100%;height:100%;object-fit:cover;}
    .nav-logo-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:white;letter-spacing:.06em;}
    .nav-logo-text span{color:var(--red);}
    .nav-links{display:flex;gap:22px;list-style:none;}
    .nav-links a{font-size:13px;color:var(--muted);text-decoration:none;transition:color .2s;}
    .nav-links a:hover{color:white;}
    .nav-badge{font-size:11px;color:var(--red);border:1px solid var(--red-dim);padding:4px 12px;border-radius:20px;letter-spacing:.08em;font-weight:500;animation:badgePulse 3s ease-in-out infinite;}
    @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0);}50%{box-shadow:0 0 0 5px rgba(192,57,43,0.12);}}
    @media(max-width:700px){.nav-links{display:none;}}

    /* HERO */
    .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 24px 80px;position:relative;overflow:hidden;}
    .hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(192,57,43,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(192,57,43,.04) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;animation:gridDrift 22s linear infinite;}
    @keyframes gridDrift{from{background-position:0 0;}to{background-position:64px 64px;}}
    .orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(90px);}
    .orb-1{width:560px;height:560px;background:radial-gradient(circle,rgba(192,57,43,.22),transparent 70%);top:-120px;left:-140px;animation:o1 16s ease-in-out infinite;}
    .orb-2{width:420px;height:420px;background:radial-gradient(circle,rgba(192,57,43,.14),transparent 70%);bottom:-60px;right:-100px;animation:o2 20s ease-in-out infinite;}
    @keyframes o1{0%,100%{transform:translate(0,0);}50%{transform:translate(70px,50px);}}
    @keyframes o2{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,-70px);}}
    .hero-inner{position:relative;z-index:1;max-width:820px;}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:12px;font-size:11px;letter-spacing:.22em;color:var(--red);text-transform:uppercase;margin-bottom:32px;opacity:0;animation:riseIn .7s ease forwards .1s;}
    .hero-eyebrow::before,.hero-eyebrow::after{content:'';width:28px;height:1px;background:var(--red);display:block;}
    .hero-logo-wrap{display:flex;justify-content:center;margin-bottom:36px;opacity:0;animation:riseIn .7s ease forwards .2s;}
    .hero-logo-wrap img{width:110px;height:110px;border-radius:24px;border:1px solid var(--border);animation:logoPulse 4s ease-in-out infinite;}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 60px rgba(192,57,43,.22),0 0 0 1px rgba(192,57,43,.1);}50%{box-shadow:0 0 100px rgba(192,57,43,.38),0 0 0 1px rgba(192,57,43,.2);}}
    .hero h1{font-family:'Syne',sans-serif;font-size:clamp(56px,11vw,104px);font-weight:800;line-height:.9;color:white;letter-spacing:-.03em;margin-bottom:12px;opacity:0;animation:riseIn .8s ease forwards .3s;}
    .hero h1 .red{color:var(--red);display:block;}
    .hero-sub{font-family:'Syne',sans-serif;font-size:clamp(12px,2vw,16px);font-weight:700;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:36px;opacity:0;animation:riseIn .7s ease forwards .42s;}

    /* STEAK ANIMATION */
    .steak-stage{width:280px;height:160px;margin:0 auto 40px;position:relative;opacity:0;animation:riseIn .8s ease forwards .35s;}
    .pan-shadow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:260px;height:18px;background:radial-gradient(ellipse,rgba(192,57,43,.4) 0%,transparent 70%);border-radius:50%;animation:panGlow 2s ease-in-out infinite;}
    @keyframes panGlow{0%,100%{opacity:.6;transform:translateX(-50%) scaleX(1);}50%{opacity:1;transform:translateX(-50%) scaleX(1.1);}}
    .steak-svg{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:210px;animation:steakBreath 3.2s ease-in-out infinite;}
    @keyframes steakBreath{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.032);}}
    .sizzle-wrap{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:210px;height:80px;pointer-events:none;}
    .spark{position:absolute;border-radius:50%;width:4px;height:4px;background:var(--red);animation:sparkFly linear infinite;}
    .spark:nth-child(1){left:18%;animation-duration:1.2s;animation-delay:0s;}
    .spark:nth-child(2){left:38%;animation-duration:1s;animation-delay:.35s;width:3px;height:3px;}
    .spark:nth-child(3){left:58%;animation-duration:1.4s;animation-delay:.65s;}
    .spark:nth-child(4){left:76%;animation-duration:1.1s;animation-delay:.2s;width:2px;height:2px;}
    .spark:nth-child(5){left:8%;animation-duration:1.3s;animation-delay:.9s;width:3px;height:3px;}
    @keyframes sparkFly{0%{opacity:0;transform:translateY(0) translateX(0) scale(1);}15%{opacity:1;}100%{opacity:0;transform:translateY(-68px) translateX(var(--dx,8px)) scale(.3);}}
    .spark:nth-child(1){--dx:-14px;}.spark:nth-child(2){--dx:9px;}.spark:nth-child(3){--dx:-7px;}.spark:nth-child(4){--dx:15px;}.spark:nth-child(5){--dx:-19px;}
    .steam-wrap{position:absolute;bottom:145px;left:50%;transform:translateX(-50%);width:210px;height:60px;}
    .wisp{position:absolute;bottom:0;width:2px;border-radius:2px;background:linear-gradient(180deg,transparent,rgba(220,180,160,.3),transparent);animation:wispRise ease-in-out infinite;}
    .wisp:nth-child(1){height:40px;left:28%;animation-duration:2.2s;animation-delay:0s;}
    .wisp:nth-child(2){height:32px;left:50%;animation-duration:2.6s;animation-delay:.7s;}
    .wisp:nth-child(3){height:36px;left:72%;animation-duration:2s;animation-delay:1.3s;}
    @keyframes wispRise{0%{opacity:0;transform:translateY(0) scaleX(1);}30%{opacity:.7;}100%{opacity:0;transform:translateY(-55px) scaleX(2.4);}}

    /* CTA */
    .cta-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0;animation:riseIn .7s ease forwards .6s;}
    .btn-coming{display:inline-flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--red-dim);color:var(--text);padding:16px 32px;border-radius:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;position:relative;overflow:hidden;cursor:default;}
    .btn-coming::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(192,57,43,.1),transparent);animation:shimmer 2.5s linear infinite;}
    @keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
    .play-icon{width:28px;height:28px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .notify-txt{font-size:13px;color:var(--caption);}
    .notify-txt a{color:var(--red);text-decoration:none;font-weight:500;}
    .notify-txt a:hover{text-decoration:underline;}

    /* DONENESS PILLS */
    .doneness-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:44px;opacity:0;animation:riseIn .7s ease forwards .72s;}
    .dpill{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid var(--border);color:var(--caption);cursor:pointer;transition:all .22s;user-select:none;}
    .dpill.active{background:var(--red);border-color:var(--red);color:white;}
    .dpill:not(.active):hover{border-color:var(--red-dim);color:var(--muted);}

    @keyframes riseIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:none;}}

    /* DIVIDER */
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--red) 30%,var(--border) 70%,transparent);max-width:1100px;margin:0 auto;}

    /* SECTIONS */
    .section{max-width:1100px;margin:0 auto;padding:100px 28px;}
    .sec-eye{font-size:11px;letter-spacing:.22em;color:var(--red);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .sec-eye::before{content:'';width:24px;height:1px;background:var(--red);}
    .sec-title{font-family:'Syne',sans-serif;font-size:clamp(30px,5vw,48px);font-weight:800;color:white;line-height:1.08;margin-bottom:14px;}
    .sec-title span{color:var(--red);}
    .sec-sub{font-size:15px;color:var(--muted);max-width:540px;line-height:1.8;margin-bottom:56px;}

    /* REVEAL */
    .reveal{opacity:0;transform:translateY(26px);transition:opacity .6s ease,transform .6s ease;}
    .reveal.on{opacity:1;transform:none;}

    /* FEATURES */
    .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    @media(max-width:800px){.feat-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:480px){.feat-grid{grid-template-columns:1fr;}}
    .feat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;transition:border-color .25s,transform .2s;position:relative;overflow:hidden;}
    .feat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red-dim),transparent);opacity:0;transition:opacity .3s;}
    .feat:hover{border-color:var(--red-dim);transform:translateY(-3px);}
    .feat:hover::before{opacity:1;}
    .feat.wide{grid-column:span 2;display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;}
    @media(max-width:480px){.feat.wide{grid-column:span 1;grid-template-columns:1fr;}}
    .feat-icon{font-size:28px;margin-bottom:14px;display:block;}
    .feat.wide .feat-icon{font-size:52px;margin:0;}
    .feat-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:white;margin-bottom:8px;}
    .feat-desc{font-size:14px;color:var(--muted);line-height:1.7;}

    /* STEPS */
    .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
    .steps::before{content:'';position:absolute;top:28px;left:12.5%;right:12.5%;height:1px;background:linear-gradient(90deg,var(--red-dim),var(--border));pointer-events:none;}
    @media(max-width:700px){.steps{grid-template-columns:1fr 1fr;gap:28px;}.steps::before{display:none;}}
    @media(max-width:400px){.steps{grid-template-columns:1fr;}}
    .step{display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 12px;}
    .step-num{width:56px;height:56px;border-radius:50%;border:1px solid var(--red-dim);background:var(--card);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--red);margin-bottom:20px;position:relative;z-index:1;flex-shrink:0;}
    .step-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:white;margin-bottom:8px;}
    .step-desc{font-size:13px;color:var(--muted);line-height:1.65;}

    /* PRICING */
    .pricing-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:680px;}
    @media(max-width:580px){.pricing-grid{grid-template-columns:1fr;}}
    .price-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px 28px;}
    .price-card.featured{border-color:var(--red-dim);position:relative;overflow:hidden;}
    .price-card.featured::after{content:'⭐ BEST VALUE';position:absolute;top:14px;right:14px;font-size:10px;letter-spacing:.1em;color:var(--red);font-weight:700;}
    .price-tier{font-size:11px;color:var(--red);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
    .price-amount{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:white;line-height:1;margin-bottom:4px;}
    .price-amount span{font-size:16px;color:var(--muted);font-weight:400;}
    .price-note{font-size:13px;color:var(--caption);margin-bottom:20px;}
    .price-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
    .price-list li{font-size:13px;color:var(--muted);padding-left:18px;position:relative;}
    .price-list li::before{content:'✓';position:absolute;left:0;color:var(--red);font-size:11px;font-weight:700;}

    /* DEVELOPER */
    .dev-section{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .dev-inner{max-width:1100px;margin:0 auto;padding:80px 28px;display:grid;grid-template-columns:auto 1fr;gap:48px;align-items:center;}
    @media(max-width:640px){.dev-inner{grid-template-columns:1fr;text-align:center;gap:28px;}.dev-socials{justify-content:center!important;}}
    .dev-pfp{width:100px;height:100px;border-radius:50%;border:2px solid var(--red-dim);object-fit:cover;flex-shrink:0;}
    .dev-eye{font-size:11px;letter-spacing:.2em;color:var(--red);text-transform:uppercase;margin-bottom:8px;}
    .dev-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:white;margin-bottom:8px;}
    .dev-bio{font-size:14px;color:var(--muted);line-height:1.75;max-width:520px;margin-bottom:24px;}
    .dev-socials{display:flex;gap:10px;flex-wrap:wrap;}
    .soc{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px;color:var(--muted);font-size:13px;font-weight:500;text-decoration:none;transition:border-color .2s,color .2s;}
    .soc:hover{border-color:var(--red);color:var(--text);}
    .soc svg{width:15px;height:15px;flex-shrink:0;}

    /* CONTACT */
    .contact-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px;position:relative;overflow:hidden;}
    .contact-box::before{content:'';position:absolute;top:-70px;right:-70px;width:240px;height:240px;background:radial-gradient(circle,rgba(192,57,43,.12),transparent 70%);pointer-events:none;}
    @media(max-width:600px){.contact-box{padding:28px 20px;}}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    @media(max-width:580px){.frow{grid-template-columns:1fr;}}
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    .fg label{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:500;}
    .fg input,.fg select,.fg textarea{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red);}
    .fg textarea{resize:vertical;min-height:120px;}
    .fg select option{background:#1C0D09;}
    .sub-btn{width:100%;padding:15px;background:var(--red);color:white;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:6px;}
    .sub-btn:hover{opacity:.87;}.sub-btn:active{transform:scale(.98);}
    .fnote{text-align:center;font-size:12px;color:var(--caption);margin-top:14px;}
    #fs{display:none;text-align:center;padding:48px 20px;}
    #fs .si{font-size:52px;margin-bottom:16px;}
    #fs h3{font-family:'Syne',sans-serif;font-size:22px;color:white;margin-bottom:8px;}
    #fs p{font-size:14px;color:var(--muted);}

    /* FOOTER */
    footer{border-top:1px solid var(--border);padding:36px 28px;}
    .foot{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px;}
    .foot-logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:white;letter-spacing:.06em;}
    .foot-logo span{color:var(--red);}
    .foot-links{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
    .foot-links a{font-size:13px;color:var(--caption);text-decoration:none;transition:color .2s;}
    .foot-links a:hover{color:var(--red);}
    .foot-copy{font-size:12px;color:var(--caption);border-top:1px solid var(--border);padding-top:16px;width:100%;text-align:center;}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}.reveal{opacity:1!important;transform:none!important;}}
  </style>
</head>
